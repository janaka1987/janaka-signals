<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Working Deriv Chart</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

header{
    padding:10px;
    background:#111a2e;
    display:flex;
    gap:10px;
    align-items:center;
}

select,button{
    padding:8px;
    border-radius:5px;
    border:none;
}

#chart{
    height:90vh;
}
</style>
</head>

<body>

<header>
<select id="market">
    <option value="R_10">Volatility 10</option>
    <option value="R_25">Volatility 25</option>
    <option value="R_50">Volatility 50</option>
    <option value="R_75">Volatility 75</option>
    <option value="R_100">Volatility 100</option>
    <option value="frxEURUSD">EURUSD</option>
</select>

<button onclick="loadData()">Load Chart</button>
</header>

<div id="chart"></div>

<script>
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:{background:{color:'#0b1220'},textColor:'#fff'},
    timeScale:{timeVisible:true}
});

let series = chart.addCandlestickSeries();

let ws;

function loadData(){

let market = document.getElementById("market").value;

ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen = function(){

    ws.send(JSON.stringify({
        ticks_history: market,
        style: "candles",
        granularity: 60,
        count: 50,
        end: "latest"
    }));

};

ws.onmessage = function(msg){

    let data = JSON.parse(msg.data);

    if(data.candles){

        let candles = data.candles.map(c=>({
            time: c.epoch,
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close
        }));

        series.setData(candles);

        ws.close(); // IMPORTANT: close after loading (stable version)
    }
};
}
</script>

</body>
</html>
