
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JANAKA SMC DASHBOARD V2</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:15px;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:12px;
padding:15px;
margin-bottom:12px;
}

select{
width:100%;
padding:10px;
font-size:16px;
border-radius:8px;
background:#0f172a;
color:white;
border:none;
}

#chart{
height:500px;
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.box{
background:#0f172a;
padding:12px;
border-radius:10px;
}

.value{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<h1>JANAKA SMC DASHBOARD V2</h1>

<div class="card">

<h3>Select Market</h3>

<select id="market">

<option value="R_10">Volatility 10</option>
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>

<option value="JD10">Jump 10</option>
<option value="JD25">Jump 25</option>
<option value="JD50">Jump 50</option>
<option value="JD75">Jump 75</option>
<option value="JD100">Jump 100</option>

<option value="RDBEAR">Bear Market</option>
<option value="RDBULL">Bull Market</option>

<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>

</select>

</div>

<div class="card">

<h3>Market Info</h3>

<p>
Selected Market:
<span id="marketName">
Volatility 10
</span>
</p>

</div>

<div class="card">

<h3>📈 Live Candlestick Chart</h3>

<div id="chart"></div>

</div>

<div class="card">

<h3>📊 Structure</h3>

<div class="grid">

<div class="box">
HH
<div class="value" id="hh">-</div>
</div>

<div class="box">
HL
<div class="value" id="hl">-</div>
</div>

<div class="box">
LH
<div class="value" id="lh">-</div>
</div>

<div class="box">
LL
<div class="value" id="ll">-</div>
</div>

</div>

</div>

<div class="card">

<h3>⚡ Market Structure</h3>

<p>BOS:
<span id="bos">NONE</span>
</p>

<p>CHOCH:
<span id="choch">NONE</span>
</p>

<p>Trend:
<span id="trend">WAIT</span>
</p>

</div>

<script>

const market =
document.getElementById("market");

market.addEventListener("change",()=>{

document.getElementById("marketName").innerText =
market.options[
market.selectedIndex
].text;

});

const chart =
LightweightCharts.createChart(
document.getElementById('chart'),
{
layout:{
background:{
color:'#0f172a'
},
textColor:'#ffffff'
},
grid:{
vertLines:{
color:'#1f2937'
},
horzLines:{
color:'#1f2937'
}
},
width:
document.getElementById('chart').clientWidth,
height:500
}
);

const candleSeries =
chart.addSeries(
LightweightCharts.CandlestickSeries
);

candleSeries.setData([

{
time:'2025-01-01',
open:100,
high:120,
low:90,
close:110
},

{
time:'2025-01-02',
open:110,
high:130,
low:105,
close:125
},

{
time:'2025-01-03',
open:125,
high:140,
low:120,
close:128
},

{
time:'2025-01-04',
open:128,
high:145,
low:118,
close:140
},

{
time:'2025-01-05',
open:140,
high:150,
low:130,
close:135
}

]);

</script>

</body>
</html>
```
