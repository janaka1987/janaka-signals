<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Trading Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

header{
    padding:10px;
    background:#111a2e;
    display:flex;
    gap:10px;
    align-items:center;
}

select, button{
    padding:8px;
    border-radius:5px;
    border:none;
}

#chart{
    height:90vh;
}
</style>
</head>

<body>

<header>
    <select id="market">
        <option value="R_10">Volatility 10</option>
        <option value="R_25">Volatility 25</option>
        <option value="R_50">Volatility 50</option>
        <option value="R_75">Volatility 75</option>
        <option value="R_100">Volatility 100</option>

        <option value="1HZ10V">Jump 10</option>
        <option value="1HZ25V">Jump 25</option>

        <option value="frxEURUSD">EUR/USD</option>
        <option value="frxGBPUSD">GBP/USD</option>
        <option value="frxUSDJPY">USD/JPY</option>
    </select>

    <button onclick="connect()">Connect</button>
    <span id="status">Disconnected</span>
</header>

<div id="chart"></div>

<script>
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: {
        background: { color: '#0b1220' },
        textColor: '#ffffff',
    },
    grid: {
        vertLines: { color: '#1f2a44' },
        horzLines: { color: '#1f2a44' },
    },
    timeScale: {
        timeVisible: true,
        secondsVisible: false,
    }
});

let candleSeries = chart.addCandlestickSeries();

let ws;
let currentMarket = "R_10";

document.getElementById("market").addEventListener("change", e=>{
    currentMarket = e.target.value;
});

function connect(){

    document.getElementById("status").innerText = "Connecting...";

    ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

    ws.onopen = function(){
        document.getElementById("status").innerText = "Connected";

        ws.send(JSON.stringify({
            ticks_history: currentMarket,
            style: "candles",
            granularity: 60,
            count: 50,
            subscribe: 1
        }));
    };

    ws.onmessage = function(msg){
        let data = JSON.parse(msg.data);

        if(data.candles){
            let candles = data.candles.map(c => ({
                time: c.epoch,
                open: c.open,
                high: c.high,
                low: c.low,
                close: c.close
            }));

            candleSeries.setData(candles);
        }

        if(data.candle){
            let c = data.candle;

            candleSeries.update({
                time: c.epoch,
                open: c.open,
                high: c.high,
                low: c.low,
                close: c.close
            });
        }
    };

    ws.onclose = function(){
        document.getElementById("status").innerText = "Disconnected";
    };
}
</script>

</body>
</html>
