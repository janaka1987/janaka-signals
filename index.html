<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Trading Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

header{
    padding:10px;
    background:#111a2e;
    display:flex;
    gap:10px;
    align-items:center;
}

select,button{
    padding:8px;
    border-radius:5px;
    border:none;
}

#chart{
    height:90vh;
}
</style>
</head>

<body>

<header>
<select id="market">
    <option value="EUR/USD">EUR/USD</option>
    <option value="GBP/USD">GBP/USD</option>
    <option value="USD/JPY">USD/JPY</option>
</select>

<button onclick="load()">Load</button>
</header>

<div id="chart"></div>

<script>
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:{background:{color:'#0b1220'},textColor:'#fff'},
    timeScale:{timeVisible:true}
});

let series = chart.addCandlestickSeries();

async function load(){

    let market = document.getElementById("market").value;

    // FREE PUBLIC CANDLE API (Twelve Data style endpoint example)
    let url = `https://api.twelvedata.com/time_series?symbol=${market}&interval=1min&outputsize=50&apikey=demo`;

    let res = await fetch(url);
    let data = await res.json();

    if(!data.values){
        alert("Data load error (API limit or network)");
        return;
    }

    let candles = data.values.map(c=>({
        time: Math.floor(new Date(c.datetime).getTime()/1000),
        open: parseFloat(c.open),
        high: parseFloat(c.high),
        low: parseFloat(c.low),
        close: parseFloat(c.close)
    })).reverse();

    series.setData(candles);
}
</script>

</body>
</html>
