<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Working Chart</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{margin:0;background:#0b1220;color:white;font-family:Arial;}
#chart{height:100vh;}
</style>
</head>

<body>

<div id="chart"></div>

<script>
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:{background:{color:'#0b1220'},textColor:'#fff'},
    timeScale:{timeVisible:true}
});

let series = chart.addCandlestickSeries();

let data = [];
let time = Math.floor(Date.now()/1000);
let price = 100;

// candle generator
function makeCandle(){

    let open = price;
    let close = open + (Math.random()-0.5)*2;
    let high = Math.max(open,close) + Math.random();
    let low = Math.min(open,close) - Math.random();

    price = close;

    data.push({
        time: time++,
        open,
        high,
        low,
        close
    });

    if(data.length > 60) data.shift();

    series.setData(data);
}

// 🔥 AUTO START (no button)
setInterval(()=>{
    makeCandle();
},1000);

</script>

</body>
</html>
