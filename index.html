<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANAKA SIGNALS V17</title>

<style>
body{
background:#0b1220;
color:white;
font-family:Arial;
padding:15px;
margin:0;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:14px;
padding:15px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.value{
font-size:26px;
font-weight:bold;
text-align:center;
color:#00ff88;
}

.buy{ color:#00ff88; }
.sell{ color:#ff5252; }
.wait{ color:#ffd54f; }
</style>
</head>

<body>

<h1>JANAKA SIGNALS V17</h1>

<!-- V16 CORE -->
<div class="card">
<h3>📡 Deriv Connection</h3>
<p>Status: <span id="status">Connecting...</span></p>
<p>Price: <span id="price">0</span></p>
<p>Direction: <span id="direction">WAIT</span></p>
<p>Trend: <span id="trend">WAIT</span></p>
<p>Ticks: <span id="ticks">0</span></p>
</div>

<!-- STRUCTURE CARD -->
<div class="card">
<h3>📊 Structure Card</h3>
<p>Structure: <span id="structure">WAIT</span></p>
<p>HH/HL/LH/LL: <span id="ms">WAIT</span></p>
</div>

<!-- BOS CARD -->
<div class="card">
<h3>⚡ BOS Card</h3>
<p id="bos">WAIT</p>
<p>CHOCH: <span id="choch">NONE</span></p>
</div>

<!-- COUNTERS -->
<div class="grid">

<div class="card">
<h3>🟢 BUY Counter</h3>
<div class="value" id="buyCount">0</div>
</div>

<div class="card">
<h3>🔴 SELL Counter</h3>
<div class="value" id="sellCount">0</div>
</div>

</div>

<!-- SIGNAL -->
<div class="card">
<h3>🔥 SIGNAL ENGINE</h3>
<div class="value" id="signal">WAIT 🟡</div>
<p>RSI: <span id="rsi">50</span></p>
<p>EMA: <span id="ema">0</span></p>
<p>Win Rate: <span id="winrate">0%</span></p>
</div>

<script>

const APP_ID = "1089";

let ws;
let prices = [];

let tickCount = 0;
let lastPrice = 0;

let buyCount = 0;
let sellCount = 0;

let lastHigh = 0;
let lastLow = 999999;

let wins = 0;
let totalSignals = 0;

/* ===== EMA ===== */
function calcEMA(arr, period=10){
let k = 2/(period+1);
let ema = arr[0];
for(let i=1;i<arr.length;i++){
ema = arr[i]*k + ema*(1-k);
}
return ema;
}

/* ===== RSI ===== */
function calcRSI(arr, period=10){
if(arr.length < period) return 50;

let gain=0, loss=0;

for(let i=arr.length-period;i<arr.length;i++){
let diff = arr[i] - arr[i-1];
if(diff >= 0) gain += diff;
else loss -= diff;
}

if(loss === 0) return 100;
let rs = gain/loss;
return 100 - (100/(1+rs));
}

/* ===== CONNECT ===== */
function connect(){

ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen = () => {
document.getElementById("status").innerHTML = "Connected 🟢";

ws.send(JSON.stringify({
ticks:"R_100",
subscribe:1
}));
};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);
if(!data.tick) return;

const price = Number(data.tick.quote);

document.getElementById("price").innerHTML = price;

tickCount++;
document.getElementById("ticks").innerHTML = tickCount;

/* ===== V16 CORE ===== */
if(price > lastPrice){
document.getElementById("direction").innerHTML = "UP 🟢";
}else{
document.getElementById("direction").innerHTML = "DOWN 🔴";
}

prices.push(price);
if(prices.length > 100) prices.shift();

/* ===== TREND ===== */
let ema = calcEMA(prices,10);
let rsi = calcRSI(prices,10);

document.getElementById("ema").innerHTML = ema.toFixed(2);
document.getElementById("rsi").innerHTML = rsi.toFixed(2);

let trend = price > ema ? "UPTREND 🟢" : "DOWNTREND 🔴";
document.getElementById("trend").innerHTML = trend;

/* ===== STRUCTURE (V18) ===== */
let high = Math.max(...prices);
let low = Math.min(...prices);

let ms = "WAIT";
let structure = "RANGE 🟡";
let bos = "NO BREAK";
let choch = "NONE";

if(price > lastHigh){
ms = "HH / HL 🟢";
bos = "BOS UP 🔥";
buyCount++;
}

if(price < lastLow){
ms = "LH / LL 🔴";
bos = "BOS DOWN 🔥";
sellCount++;
}

/* CHOCH (V18) */
if(price < ema && trend === "UPTREND 🟢"){
choch = "CHOCH 🔴";
}

if(price > ema && trend === "DOWNTREND 🔴"){
choch = "CHOCH 🟢";
}

lastHigh = high;
lastLow = low;

/* update UI */
document.getElementById("ms").innerHTML = ms;
document.getElementById("structure").innerHTML = structure;
document.getElementById("bos").innerHTML = bos;
document.getElementById("choch").innerHTML = choch;

document.getElementById("buyCount").innerHTML = buyCount;
document.getElementById("sellCount").innerHTML = sellCount;

/* ===== SIGNAL ENGINE (V19 PRO) ===== */

let signal = "WAIT 🟡";

if(trend === "UPTREND 🟢" && rsi < 70 && bos === "BOS UP 🔥"){
signal = "BUY 🟢";
}

else if(trend === "DOWNTREND 🔴" && rsi > 30 && bos === "BOS DOWN 🔥"){
signal = "SELL 🔴";
}

/* WIN RATE */
totalSignals++;

if(signal !== "WAIT 🟡"){
wins++;
}

let winrate = totalSignals > 0 ? (wins/totalSignals)*100 : 0;
document.getElementById("signal").innerHTML = signal;
document.getElementById("winrate").innerHTML = winrate.toFixed(1) + "%";

lastPrice = price;

};

ws.onerror = () => {
document.getElementById("status").innerHTML = "Error 🔴";
};

ws.onclose = () => {
document.getElementById("status").innerHTML = "Reconnecting... ⚫";
setTimeout(connect, 3000);
};

}

connect();

</script>

</body>
</html>
