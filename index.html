<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANAKA SIGNALS V17</title>

<style>
body{
background:#0b1220;
color:white;
font-family:Arial;
padding:15px;
margin:0;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:14px;
padding:15px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.value{
font-size:26px;
font-weight:bold;
text-align:center;
color:#00ff88;
}

.buy{ color:#00ff88; font-weight:bold; }
.sell{ color:#ff5252; font-weight:bold; }
.wait{ color:#ffd54f; font-weight:bold; }
</style>
</head>

<body>

<h1>JANAKA SIGNALS V17</h1>

<!-- STRUCTURE CARD -->
<div class="card">
<h3>📊 Structure Card</h3>
<p>Trend: <span id="trend">WAIT</span></p>
<p>Structure: <span id="structure">WAIT</span></p>
<p>Price: <span id="price">0</span></p>
</div>

<!-- BOS CARD -->
<div class="card">
<h3>⚡ BOS Card</h3>
<p id="bos">WAIT</p>
</div>

<!-- COUNTERS -->
<div class="grid">

<div class="card">
<h3>🟢 BUY Counter</h3>
<div class="value" id="buyCount">0</div>
</div>

<div class="card">
<h3>🔴 SELL Counter</h3>
<div class="value" id="sellCount">0</div>
</div>

</div>

<script>

const APP_ID = "1089";

let ws;
let prices = [];

let buyCount = 0;
let sellCount = 0;

let lastHigh = 0;
let lastLow = 999999;

let reconnecting = false;

function connect(){

ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen = () => {
console.log("Connected");

ws.send(JSON.stringify({
ticks:"R_100",
subscribe:1
}));

reconnecting = false;
};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);
if(!data.tick) return;

const price = Number(data.tick.quote);
document.getElementById("price").innerHTML = price;

prices.push(price);
if(prices.length > 50) prices.shift();

// ---------------- TREND ----------------
let trend = "WAIT";

if(prices.length > 10){
if(price > prices[0]){
trend = "UPTREND 🟢";
}
else if(price < prices[0]){
trend = "DOWNTREND 🔴";
}
}

document.getElementById("trend").innerHTML = trend;

// ---------------- STRUCTURE ----------------
let structure = "WAIT";

let high = Math.max(...prices);
let low = Math.min(...prices);

if(price > high * 0.999){
structure = "BULLISH STRUCTURE 🟢";
}

if(price < low * 1.001){
structure = "BEARISH STRUCTURE 🔴";
}

document.getElementById("structure").innerHTML = structure;

// ---------------- BOS ----------------
let bos = "NO BREAK";

if(price > lastHigh && lastHigh !== 0){
bos = "BOS UP 🔥";
buyCount++;
}

if(price < lastLow && lastLow !== 999999){
bos = "BOS DOWN 🔥";
sellCount++;
}

lastHigh = high;
lastLow = low;

document.getElementById("bos").innerHTML = bos;

// ---------------- COUNTERS ----------------
document.getElementById("buyCount").innerHTML = buyCount;
document.getElementById("sellCount").innerHTML = sellCount;

};

// ERROR HANDLING
ws.onerror = () => {
console.log("WebSocket Error");
};

// AUTO RECONNECT (IMPORTANT)
ws.onclose = () => {

if(!reconnecting){
reconnecting = true;
setTimeout(() => {
connect();
}, 3000);
}

};

}

// START
connect();

</script>

</body>
</html>
