<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANAKA SIGNALS V18 PRO</title>

<style>
body{
background:#0b1220;
color:white;
font-family:Arial;
padding:15px;
margin:0;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:14px;
padding:15px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.value{
font-size:26px;
font-weight:bold;
text-align:center;
color:#00ff88;
}

.buy{ color:#00ff88; font-weight:bold; }
.sell{ color:#ff5252; font-weight:bold; }
.wait{ color:#ffd54f; font-weight:bold; }
</style>
</head>

<body>

<h1>JANAKA SIGNALS V18 + V19 PRO</h1>

<!-- STATUS -->
<div class="card">
<h3>📡 Connection</h3>
<p>Status: <span id="status">Connecting...</span></p>
<p>Price: <span id="price">0</span></p>
<p>Trend: <span id="trend">WAIT</span></p>
<p>RSI: <span id="rsi">0</span></p>
<p>EMA: <span id="ema">0</span></p>
</div>

<!-- STRUCTURE (V18) -->
<div class="card">
<h3>📊 Market Structure (V18)</h3>
<p>Structure: <span id="structure">WAIT</span></p>
<p>HH / HL / LH / LL: <span id="ms">WAIT</span></p>
<p>CHOCH: <span id="choch">NONE</span></p>
<p>BOS: <span id="bos">WAIT</span></p>
</div>

<!-- COUNTERS -->
<div class="grid">

<div class="card">
<h3>🟢 BUY Count</h3>
<div class="value" id="buyCount">0</div>
</div>

<div class="card">
<h3>🔴 SELL Count</h3>
<div class="value" id="sellCount">0</div>
</div>

</div>

<!-- SIGNAL -->
<div class="card">
<h3>🔥 SIGNAL ENGINE</h3>
<div class="value" id="signal">WAIT 🟡</div>
<p>Win Rate: <span id="winrate">0%</span></p>
</div>

<script>

const APP_ID = "1089";

let ws;
let prices = [];

let buyCount = 0;
let sellCount = 0;

let lastHigh = 0;
let lastLow = 999999;

let ema = 0;
let rsi = 50;

let wins = 0;
let totalSignals = 0;

// SIMPLE EMA
function calcEMA(prices, period=10){
let k = 2/(period+1);
let ema = prices[0];

for(let i=1;i<prices.length;i++){
ema = prices[i]*k + ema*(1-k);
}
return ema;
}

// SIMPLE RSI
function calcRSI(prices, period=10){
if(prices.length < period) return 50;

let gain=0, loss=0;

for(let i=prices.length-period;i<prices.length;i++){
let diff = prices[i] - prices[i-1];
if(diff>=0) gain += diff;
else loss -= diff;
}

if(loss === 0) return 100;
let rs = gain/loss;
return 100 - (100/(1+rs));
}

function connect(){

ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen = () => {
document.getElementById("status").innerHTML = "Connected 🟢";

ws.send(JSON.stringify({
ticks:"R_100",
subscribe:1
}));
};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);
if(!data.tick) return;

const price = Number(data.tick.quote);

document.getElementById("price").innerHTML = price;

prices.push(price);
if(prices.length > 100) prices.shift();

/* ===== EMA + RSI ===== */
ema = calcEMA(prices,10);
rsi = calcRSI(prices,10);

document.getElementById("ema").innerHTML = ema.toFixed(2);
document.getElementById("rsi").innerHTML = rsi.toFixed(2);

/* ===== TREND ===== */
let trend = "WAIT";
if(price > ema) trend = "UPTREND 🟢";
else trend = "DOWNTREND 🔴";

document.getElementById("trend").innerHTML = trend;

/* ===== MARKET STRUCTURE (V18) ===== */
let high = Math.max(...prices);
let low = Math.min(...prices);

let ms = "WAIT";
let structure = "RANGE 🟡";
let choch = "NONE";
let bos = "WAIT";

if(price > lastHigh){
ms = "HH / HL 🟢";
bos = "BOS UP 🔥";
buyCount++;
}

if(price < lastLow){
ms = "LH / LL 🔴";
bos = "BOS DOWN 🔥";
sellCount++;
}

if(price < ema && trend === "UPTREND 🟢"){
choch = "CHOCH 🔴 (Reversal)";
}

if(price > ema && trend === "DOWNTREND 🔴"){
choch = "CHOCH 🟢 (Reversal)";
}

lastHigh = high;
lastLow = low;

document.getElementById("structure").innerHTML = structure;
document.getElementById("ms").innerHTML = ms;
document.getElementById("bos").innerHTML = bos;
document.getElementById("choch").innerHTML = choch;

/* ===== COUNTERS ===== */
document.getElementById("buyCount").innerHTML = buyCount;
document.getElementById("sellCount").innerHTML = sellCount;

/* ===== SIGNAL ENGINE (V19 PRO FILTER) ===== */

let signal = "WAIT 🟡";

if(
trend === "UPTREND 🟢" &&
rsi < 70 &&
bos === "BOS UP 🔥"
){
signal = "BUY 🟢";
}

else if(
trend === "DOWNTREND 🔴" &&
rsi > 30 &&
bos === "BOS DOWN 🔥"
){
signal = "SELL 🔴";
}

/* WIN RATE LOGIC */
totalSignals++;

if(signal !== "WAIT 🟡"){
wins++; // simulation tracking
}

let winrate = (wins/totalSignals)*100;
document.getElementById("signal").innerHTML = signal;
document.getElementById("winrate").innerHTML = winrate.toFixed(1) + "%";

};

ws.onerror = () => {
document.getElementById("status").innerHTML = "Error 🔴";
};

ws.onclose = () => {
document.getElementById("status").innerHTML = "Reconnecting... ⚫";
setTimeout(connect, 3000);
};

}

connect();

</script>

</body>
</html>
