<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANAKA SIGNALS V17</title>

<style>
body{
background:#0b1220;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:14px;
padding:15px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.value{
font-size:26px;
font-weight:bold;
text-align:center;
color:#00ff88;
}

.buy{ color:#00ff88; }
.sell{ color:#ff5252; }
.wait{ color:#ffd54f; }

.history{
max-height:200px;
overflow:auto;
}
</style>

</head>

<body>

<h1>JANAKA SIGNALS V17</h1>

<!-- ================= V16 ORIGINAL CARD ================= -->
<div class="card">
<h3>📡 Deriv Connection</h3>
<p>Status: <span id="status">Connecting...</span></p>
<p>Current Price: <span id="price">0</span></p>
<p>Direction: <span id="direction">WAIT</span></p>
<p>Trend: <span id="trend">WAIT</span></p>
<p>Trend Strength: <span id="trendStrength">WAIT</span></p>
<p>Ticks: <span id="ticks">0</span></p>
</div>

<!-- ================= SIGNAL CARD (V16) ================= -->
<div class="grid">

<div class="card">
<h3>Signal</h3>
<div class="value" id="signal">WAIT 🟡</div>
</div>

<div class="card">
<h3>Confidence</h3>
<div class="value" id="confidence">0%</div>
</div>

</div>

<!-- ================= ADD 1: STRUCTURE CARD ================= -->
<div class="card">
<h3>📊 Structure Card</h3>
<p>Structure: <span id="structure">WAIT</span></p>
<p>High: <span id="high">0</span></p>
<p>Low: <span id="low">0</span></p>
</div>

<!-- ================= ADD 2: BOS CARD ================= -->
<div class="card">
<h3>⚡ BOS Card</h3>
<p id="bos">WAIT</p>
</div>

<!-- ================= ADD 3 & 4: COUNTERS ================= -->
<div class="grid">

<div class="card">
<h3>🟢 BUY Counter</h3>
<div class="value" id="buyCount">0</div>
</div>

<div class="card">
<h3>🔴 SELL Counter</h3>
<div class="value" id="sellCount">0</div>
</div>

</div>

<!-- ================= ADD 5: HISTORY ================= -->
<div class="card">
<h3>Signal History</h3>
<div class="history" id="history"></div>
</div>

<script>

const APP_ID = "1089";

let ws;
let prices = [];
let tickCount = 0;

let lastPrice = 0;

let buyCount = 0;
let sellCount = 0;

let lastHigh = 0;
let lastLow = 999999;

let signalCooldown = 0;
let lastSignal = "WAIT";

function addHistory(text){
document.getElementById("history").innerHTML =
"<p>"+text+"</p>" +
document.getElementById("history").innerHTML;
}

/* ================= AUTO RECONNECT FUNCTION ================= */
function connect(){

ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen = () => {

document.getElementById("status").innerHTML = "Connected 🟢";

ws.send(JSON.stringify({
ticks:"R_100",
subscribe:1
}));

};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);
if(!data.tick) return;

const price = Number(data.tick.quote);

document.getElementById("price").innerHTML = price;

tickCount++;
document.getElementById("ticks").innerHTML = tickCount;

/* ===== V16 LOGIC (UNCHANGED) ===== */

if(price > lastPrice){
document.getElementById("direction").innerHTML = "UP 🟢";
}
else if(price < lastPrice){
document.getElementById("direction").innerHTML = "DOWN 🔴";
}

prices.push(price);
if(prices.length > 50) prices.shift();

let trend = "WAIT";

if(prices.length >= 10){
if(price > prices[0]){
trend = "UPTREND 🟢";
}
else if(price < prices[0]){
trend = "DOWNTREND 🔴";
}
}

document.getElementById("trend").innerHTML = trend;

/* ===== ADD 1: STRUCTURE ===== */

let high = Math.max(...prices);
let low = Math.min(...prices);

document.getElementById("high").innerHTML = high;
document.getElementById("low").innerHTML = low;

let structure = "RANGE 🟡";

if(price > high * 0.999){
structure = "BULLISH STRUCTURE 🟢";
}

if(price < low * 1.001){
structure = "BEARISH STRUCTURE 🔴";
}

document.getElementById("structure").innerHTML = structure;

/* ===== ADD 2: BOS ===== */

let bos = "NO BREAK";

if(price > lastHigh && lastHigh !== 0){
bos = "BOS UP 🔥";
buyCount++;
}

if(price < lastLow && lastLow !== 999999){
bos = "BOS DOWN 🔥";
sellCount++;
}

document.getElementById("bos").innerHTML = bos;

/* update levels */
lastHigh = high;
lastLow = low;

/* ===== ADD 3 & 4: COUNTERS ===== */

document.getElementById("buyCount").innerHTML = buyCount;
document.getElementById("sellCount").innerHTML = sellCount;

/* ===== V16 LAST PRICE ===== */

lastPrice = price;

};

/* ================= ERROR ================= */
ws.onerror = () => {
document.getElementById("status").innerHTML = "Error 🔴";
};

/* ================= AUTO RECONNECT ================= */
ws.onclose = () => {
document.getElementById("status").innerHTML = "Reconnecting... ⚫";
setTimeout(connect, 3000);
};

}

/* START */
connect();

</script>

</body>
</html>
