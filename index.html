<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JANAKA SMC V4</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:15px;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

select{
width:100%;
padding:10px;
font-size:16px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

#chart{
width:100%;
height:700px;
}

.small{
color:#94a3b8;
font-size:13px;
}

</style>
</head>

<body>

<h1>JANAKA SMC V4</h1>

<div class="card">

<h3>Select Market</h3>

<select id="market">

<option value="R_10">Volatility 10</option>
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100" selected>Volatility 100</option>

<option value="JD10">Jump 10</option>
<option value="JD25">Jump 25</option>
<option value="JD50">Jump 50</option>
<option value="JD75">Jump 75</option>
<option value="JD100">Jump 100</option>

</select>

</div>

<div class="card">

<p>
Selected Market:
<span id="marketName">
Volatility 100
</span>
</p>

<p>
Status:
<span id="status">
Connecting...
</span>
</p>

<p class="small" id="infoText">
Loading...
</p>

</div>

<div class="card">

<div id="chart"></div>

</div>

<script>

const APP_ID = "1089";

const marketSelect =
document.getElementById("market");

const marketName =
document.getElementById("marketName");

const statusText =
document.getElementById("status");

const infoText =
document.getElementById("infoText");

const chartDiv =
document.getElementById("chart");

let chart;
let candleSeries;
let ws;

chart =
LightweightCharts.createChart(
chartDiv,
{
layout:{
background:{
color:"#0b1220"
},
textColor:"#ffffff"
},
width:chartDiv.clientWidth,
height:700
}
);

statusText.innerText = "Chart OK";
infoText.innerText = "JavaScript Running";
function connect(){

statusText.innerText = "Connecting...";

ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = () => {

statusText.innerText = "Connected 🟢";

infoText.innerText = "Connected to Deriv";

ws.send(JSON.stringify({
ticks:"R_100",
subscribe:1
}));

};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);

if(data.tick){

infoText.innerText =
"Price : " + data.tick.quote;

}

};

ws.onerror = () => {

statusText.innerText = "Error 🔴";

};

ws.onclose = () => {

statusText.innerText = "Disconnected 🔴";

};

}

connect();
</script>

</body>
</html>
