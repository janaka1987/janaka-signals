<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Janaka Signals V2</title>

<style>

body{
background:#08111f;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:15px;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#101b2d;
border:1px solid #00ff88;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
border-radius:8px;
background:#08111f;
color:white;
border:1px solid #00ff88;
}

.scan{
width:100%;
padding:15px;
font-size:20px;
font-weight:bold;
background:#00ff88;
border:none;
border-radius:10px;
cursor:pointer;
}

.signal{
font-size:32px;
font-weight:bold;
color:#00ff88;
text-align:center;
}

</style>
</head>

<body>

<h1>JANAKA SIGNALS</h1>

<div class="card">

<h3>Select Asset</h3>

<select>

<option>Volatility 100</option>
<option>Volatility 75</option>
<option>Jump 100</option>
<option>Bull Market</option>
<option>Bear Market</option>
<option>EUR/USD</option>
<option>GBP/USD</option>
<option>XAU/USD (Gold)</option>

</select>

</div>

<div class="card">

<h3>Current Signal</h3>

<div class="signal">
BUY 🟢
</div>

</div>

<div class="card">

<h3>Trend</h3>

<h2>UPTREND 📈</h2>

</div>

<div class="card">

<h3>Signal History</h3>

<p>BUY - Volatility 100</p>
<p>SELL - EUR/USD</p>
<p>BUY - Gold</p>

</div>

<button class="scan">
SCAN MARKET
</button>

</body>
</html>
