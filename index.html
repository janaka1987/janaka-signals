<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JANAKA SIGNALS V15</title>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
color:#00ff88;
}

.card{
background:#111c2e;
border:1px solid #1f3b5b;
border-radius:14px;
padding:15px;
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.value{
font-size:28px;
font-weight:bold;
text-align:center;
color:#00ff88;
}

.red{
color:#ff5252;
}

.yellow{
color:#ffd54f;
}

.green{
color:#00ff88;
}

</style>

</head>

<body>

<h1>JANAKA SIGNALS V15</h1>

<div class="card">

<h3>📡 Deriv Connection</h3>

<p>Status:
<span id="status">Connecting...</span>
</p>

</div>

<div class="grid">

<div class="card">

<h3>💰 Current Price</h3>

<div class="value" id="price">
0
</div>

</div>

<div class="card">

<h3>🔢 Ticks</h3>

<div class="value" id="ticks">
0
</div>

</div>

</div>

<div class="card">

<h3>📈 Direction</h3>

<div class="value" id="direction">
WAIT
</div>

</div>

<script>

// APP ID
const APP_ID = 33yT1dsi34DD6WXIM9hB6

// WEBSOCKET
const ws = new WebSocket(
`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`
);

let lastPrice = 0;
let tickCount = 0;

ws.onopen = () => {

document.getElementById("status").innerHTML =
"Connected 🟢";

ws.send(JSON.stringify({

ticks:"R_100",

subscribe:1

}));

};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);

if(!data.tick) return;

const price =
Number(data.tick.quote);

document.getElementById("price").innerHTML =
price;

tickCount++;

document.getElementById("ticks").innerHTML =
tickCount;

if(price > lastPrice){

document.getElementById("direction").innerHTML =
"UP 🟢";

}
else if(price < lastPrice){

document.getElementById("direction").innerHTML =
"DOWN 🔴";

}

lastPrice = price;

};

ws.onerror = () => {

document.getElementById("status").innerHTML =
"Error 🔴";

};

ws.onclose = (e) => {

document.getElementById("status").innerHTML =
"Closed ⚫ " + e.code;

};

</script>

</body>
</html>
