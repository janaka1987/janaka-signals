<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE WORKING CHART</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{margin:0;background:#0b1220;color:white;font-family:Arial;}
header{padding:10px;background:#111a2e;}
button{padding:8px;border:none;border-radius:5px;}
#chart{height:90vh;}
</style>
</head>

<body>

<header>
<button id="btn">START CHART</button>
</header>

<div id="chart"></div>

<script>
let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:{background:{color:'#0b1220'},textColor:'#fff'},
    timeScale:{timeVisible:true}
});

let series = chart.addCandlestickSeries();

let data = [];
let time = Math.floor(Date.now()/1000);
let price = 100;

// candle generator
function makeCandle(){

    let open = price;
    let close = open + (Math.random()-0.5)*2;
    let high = Math.max(open,close) + Math.random();
    let low = Math.min(open,close) - Math.random();

    price = close;

    data.push({
        time: time++,
        open,
        high,
        low,
        close
    });

    if(data.length > 50) data.shift();

    series.setData(data);
}

// START button FIX
document.getElementById("btn").addEventListener("click", function(){

    setInterval(()=>{
        makeCandle();
    },1000);

});
</script>

</body>
</html>
